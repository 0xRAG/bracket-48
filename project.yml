name: Bracket48
options:
  bundleIdPrefix: app.bracket48
  deploymentTarget:
    iOS: "17.0"
packages:
  Bracket48Core:
    path: App/Bracket48Core
  Supabase:
    url: https://github.com/supabase/supabase-swift.git
    from: 2.0.0
targets:
  Bracket48:
    type: application
    platform: iOS
    configFiles:
      Debug: App/Bracket48/Support/Bracket48.xcconfig
      Release: App/Bracket48/Support/Bracket48.xcconfig
    sources:
      - App/Bracket48
    dependencies:
      - package: Bracket48Core
      - package: Supabase
        product: Supabase
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.bracket48.Bracket48
        DEVELOPMENT_TEAM: 497S7CC998
        INFOPLIST_FILE: App/Bracket48/Support/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/Bracket48/Support/Bracket48.entitlements
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_VERSION: "6.0"
