name: WorldCupBracket
options:
  bundleIdPrefix: app.bracket48
  deploymentTarget:
    iOS: "17.0"
packages:
  WorldCupBracketCore:
    path: App/WorldCupBracketCore
  Supabase:
    url: https://github.com/supabase/supabase-swift.git
    from: 2.0.0
targets:
  WorldCupBracket:
    type: application
    platform: iOS
    configFiles:
      Debug: App/WorldCupBracket/Support/WorldCupBracket.xcconfig
      Release: App/WorldCupBracket/Support/WorldCupBracket.xcconfig
    sources:
      - App/WorldCupBracket
    dependencies:
      - package: WorldCupBracketCore
      - package: Supabase
        product: Supabase
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.bracket48.Bracket48
        DEVELOPMENT_TEAM: 497S7CC998
        INFOPLIST_FILE: App/WorldCupBracket/Support/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/WorldCupBracket/Support/WorldCupBracket.entitlements
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_VERSION: "6.0"
