name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  app:
    name: App And Core Tests
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Enable pnpm
        run: corepack enable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Swift core tests
        run: make test

      - name: Supabase function tests
        run: make test-functions

      - name: iOS simulator build
        run: make build-ios

  linked-backend-smoke:
    name: Linked Backend Smoke
    runs-on: ubuntu-latest
    env:
      HAS_SUPABASE_SMOKE: ${{ secrets.SUPABASE_ACCESS_TOKEN != '' && secrets.SUPABASE_DB_PASSWORD != '' && vars.SUPABASE_PROJECT_REF != '' }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Enable pnpm
        run: corepack enable

      - name: Skip linked smoke when secrets are missing
        if: env.HAS_SUPABASE_SMOKE != 'true'
        run: |
          echo "Skipping linked Supabase smoke tests."
          echo "Configure repository variable SUPABASE_PROJECT_REF and secrets SUPABASE_ACCESS_TOKEN, SUPABASE_DB_PASSWORD to enable."

      - name: Link hosted Supabase project
        if: env.HAS_SUPABASE_SMOKE == 'true'
        run: pnpm dlx supabase link --workdir Backend --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Run linked RPC/RLS smoke tests
        if: env.HAS_SUPABASE_SMOKE == 'true'
        run: make test-backend-linked-query
